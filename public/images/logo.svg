  <rect width="48" height="48" rx="12" fill="url(#grad)"/>
  
  <!-- Mountain shape -->
  <path d="M10 36L19 16L24 24L28 18L38 36H10Z" fill="white" fill-opacity="0.95"/>
  
  <!-- Mountain shadow -->
