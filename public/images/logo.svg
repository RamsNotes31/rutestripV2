  <!-- Snow cap -->
  <path d="M17.5 19L19 16L20.5 19" fill="white" stroke="white" stroke-width="0.5"/>
  
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="48" y2="48">
      <stop offset="0%" stop-color="#10B981"/>
